<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="40" cy="40" r="34"/>
    </clipPath>
  </defs>

  <!-- Circle background -->
  <circle cx="40" cy="40" r="34" fill="url(#circleGrad)"/>

  <!-- Glossy shine -->
  <ellipse cx="40" cy="24" rx="20" ry="12" fill="url(#glossGrad)" clip-path="url(#circleClip)"/>

  <!-- Letter A -->
  <text x="40" y="40" font-family="Poppins, Arial Black, sans-serif" font-weight="900" font-size="34" fill="white" text-anchor="middle" dominant-baseline="central" letter-spacing="-1">A</text>

  <!-- Green dot accent on circle -->
  <circle cx="66" cy="62" r="5" fill="#4ade80"/>

  <!-- AZAM text -->
  <text x="90" y="50" font-family="Poppins, Arial Black, sans-serif" font-weight="800" font-size="38" fill="#111827" letter-spacing="1">AZAM</text>

  <!-- Green dot after AZAM -->
  <text x="298" y="44" font-family="Poppins, Arial Black, sans-serif" font-weight="900" font-size="44" fill="#22c55e">.</text>
</svg>
